<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Строй-Убивай</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Arial Black', Impact, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        /* --- ФОН И СЕТКИ --- */
        .grid-base, .grid-light {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: 40px 40px;
            animation: moveGrid 2s linear infinite;
        }

        .grid-base {
            background-image: 
                linear-gradient(#1a1a1a 1px, transparent 1px), 
                linear-gradient(90deg, #1a1a1a 1px, transparent 1px);
            z-index: 0;
        }

        .grid-light {
            background-image: 
                linear-gradient(#444444 1px, transparent 1px), 
                linear-gradient(90deg, #444444 1px, transparent 1px);
            z-index: 1;
            pointer-events: none;
            -webkit-mask-image: radial-gradient(circle 120px at var(--x, -100%) var(--y, -100%), black, transparent);
            mask-image: radial-gradient(circle 120px at var(--x, -100%) var(--y, -100%), black, transparent);
        }

        @keyframes moveGrid {
            0% { background-position: 0 0; }
            100% { background-position: 40px 40px; }
        }

        /* --- КОНТЕНТ --- */
        .content {
            position: relative;
            z-index: 2;
        }

        h1 {
            font-size: 5rem;
            margin: 0 0 10px 0;
            text-transform: uppercase;
        }

        p {
            font-family: monospace;
            font-size: 1.5rem;
            color: #888;
            margin: 0 0 40px 0;
        }

        /* --- МЕХАНИЧЕСКАЯ ПЛОСКАЯ КНОПКА --- */
        .btn {
            background-color: #ba3232; 
            color: #ffffff;
            text-decoration: none;
            font-size: 2rem;
            padding: 20px 60px;
            text-transform: uppercase;
            display: inline-block;
            transition: transform 0.1s ease, background-color 0.2s ease, box-shadow 0.1s ease;
        }

        .btn:hover {
            background-color: #d63c3c; 
            transform: translateY(-6px); 
            box-shadow: 0 6px 0 #7a1d1d; 
        }

        .btn:active {
            background-color: #9c2a2a; 
            transform: translateY(0); 
            box-shadow: 0 0 0 #7a1d1d; 
        }

        /* --- ФУТЕР (ТЕКСТ СНИЗУ) --- */
        .footer-text {
            position: absolute;
            bottom: 30px;
            z-index: 2;
            font-family: monospace;
            font-size: 1rem;
            color: #444444; /* Тусклый цвет по умолчанию */
            text-decoration: none;
            line-height: 1.5;
            transition: color 0.3s ease;
            cursor: pointer;
        }

        .footer-text:hover {
            color: #aaaaaa; /* Мягко-серый при наведении */
        }

        /* --- ПОДСКАЗКА ВОЗЛЕ КУРСОРА --- */
        .cursor-tooltip {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none; /* Чтобы не мешала кликать */
            opacity: 0; /* Скрыта по умолчанию */
            color: rgba(255, 255, 255, 0.35); /* Сделал на 20% виднее, было 0.15 */
            font-family: monospace;
            font-size: 0.85rem;
            z-index: 9999;
            transform: translate(15px, 15px); /* Смещение от курсора */
            transition: opacity 0.2s ease;
        }
    </style>
</head>
<body>

    <!-- Две сетки -->
    <div class="grid-base"></div>
    <div class="grid-light"></div>

    <!-- Текст и кнопка -->
    <div class="content">
        <h1>Строй-Убивай</h1>
        <p>79.137.192.234:27015</p>

        <a href="steam://connect/79.137.192.234:27015" class="btn">Играть</a>
    </div>

    <!-- Ссылка на дискорд снизу -->
    <a href="https://discord.gg/AVwJDVncsq" class="footer-text" target="_blank">
        Сайт находится на этапе разработки<br>
        Ожидайте новой информации на дискорд сервере
    </a>

    <!-- Подсказка -->
    <div class="cursor-tooltip">(кликни чтобы перейти в дс)</div>

    <!-- Скрипты -->
    <script>
        const gridLight = document.querySelector('.grid-light');
        const tooltip = document.querySelector('.cursor-tooltip');
        const footerText = document.querySelector('.footer-text');
        
        document.addEventListener('mousemove', (e) => {
            // Движение маски сетки
            gridLight.style.setProperty('--x', e.clientX + 'px');
            gridLight.style.setProperty('--y', e.clientY + 'px');

            // Подсказка бегает за курсором
            tooltip.style.left = e.clientX + 'px';
            tooltip.style.top = e.clientY + 'px';
        });

        // Показываем тултип
        footerText.addEventListener('mouseenter', () => {
            tooltip.style.opacity = '1'; 
        });

        // Скрываем тултип
        footerText.addEventListener('mouseleave', () => {
            tooltip.style.opacity = '0';
        });
    </script>

</body>
</html>
